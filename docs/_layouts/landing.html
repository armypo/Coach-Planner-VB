<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% seo %}
  <style>
    :root {
      --orange: #E8734A;
      --orange-dark: #C55A32;
      --bleu: #4A8AF4;
      --vert: #34C785;
      --violet: #9B7AE8;
      --texte: #0a0a0a;
      --texte-secondaire: #555;
      --fond: #fff;
      --fond-section: #fafafa;
      --bordure: #e5e5e7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --texte: #f5f5f7;
        --texte-secondaire: #a1a1a6;
        --fond: #0a0a0a;
        --fond-section: #141414;
        --bordure: #2c2c2e;
      }
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      color: var(--texte);
      background: var(--fond);
      margin: 0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--bleu); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 24px 96px;
      background: radial-gradient(ellipse at top, rgba(232, 115, 74, 0.15), transparent 60%);
    }
    .hero .logo-line {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .hero .logo-line .dot {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--orange);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
    }
    .hero .logo-line strong {
      font-size: 2em;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .hero h1 {
      font-size: clamp(1.8em, 5vw, 3.2em);
      line-height: 1.1;
      margin: 0 auto 20px;
      max-width: 780px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    .hero p.tagline {
      font-size: clamp(1em, 2.2vw, 1.3em);
      color: var(--texte-secondaire);
      max-width: 640px;
      margin: 0 auto 40px;
    }
    .hero .cta-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1em;
      transition: transform 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--orange);
      color: white;
    }
    .btn-primary:hover { background: var(--orange-dark); }
    .btn-secondary {
      background: transparent;
      color: var(--texte);
      border: 1.5px solid var(--bordure);
    }
    .badge-qc {
      display: inline-block;
      font-size: 0.75em;
      font-weight: 600;
      color: var(--orange);
      padding: 4px 12px;
      border: 1px solid var(--orange);
      border-radius: 999px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
    }

    /* Section features */
    .features {
      background: var(--fond-section);
      padding: 80px 24px;
    }
    .features .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .features h2 {
      text-align: center;
      font-size: clamp(1.5em, 3vw, 2.2em);
      margin: 0 0 48px;
      letter-spacing: -0.01em;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .feature-card {
      background: var(--fond);
      border: 1px solid var(--bordure);
      border-radius: 16px;
      padding: 24px;
    }
    .feature-card .icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }
    .feature-card h3 {
      font-size: 1.15em;
      margin: 0 0 8px;
    }
    .feature-card p {
      font-size: 0.95em;
      color: var(--texte-secondaire);
      margin: 0;
      line-height: 1.55;
    }

    /* Pricing */
    .pricing {
      padding: 80px 24px;
    }
    .pricing .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .pricing h2 {
      text-align: center;
      font-size: clamp(1.5em, 3vw, 2.2em);
      margin: 0 0 16px;
      letter-spacing: -0.01em;
    }
    .pricing .sous-titre {
      text-align: center;
      color: var(--texte-secondaire);
      margin-bottom: 40px;
    }
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .plan {
      border: 1px solid var(--bordure);
      border-radius: 20px;
      padding: 32px 28px;
      position: relative;
    }
    .plan.pro { border-color: var(--orange); }
    .plan.club {
      border-color: var(--violet);
      background: linear-gradient(160deg, rgba(155, 122, 232, 0.06), transparent);
    }
    .plan.club .popular {
      position: absolute;
      top: -12px;
      left: 28px;
      background: var(--violet);
      color: white;
      font-size: 0.75em;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
    }
    .plan h3 { margin: 0 0 4px; font-size: 1.3em; }
    .plan .tagline-plan { color: var(--texte-secondaire); font-size: 0.92em; margin: 0 0 24px; }
    .plan .prix-line { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
    .plan .prix-line .prix { font-size: 2em; font-weight: 700; }
    .plan .prix-line .periode { color: var(--texte-secondaire); }
    .plan .prix-an { font-size: 0.85em; color: var(--texte-secondaire); margin-bottom: 24px; }
    .plan ul { list-style: none; padding: 0; margin: 0 0 28px; }
    .plan ul li { padding: 6px 0; display: flex; gap: 8px; font-size: 0.95em; }
    .plan ul li::before { content: "✓"; color: var(--vert); font-weight: 700; }
    .plan.pro ul li::before { color: var(--orange); }
    .plan.club ul li::before { color: var(--violet); }
    .plan .essai {
      background: var(--fond-section);
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.88em;
      color: var(--texte-secondaire);
    }

    /* Privacy strip */
    .privacy-strip {
      background: var(--fond-section);
      border-top: 1px solid var(--bordure);
      border-bottom: 1px solid var(--bordure);
      padding: 48px 24px;
      text-align: center;
    }
    .privacy-strip .container { max-width: 780px; margin: 0 auto; }
    .privacy-strip h2 { font-size: 1.4em; margin: 0 0 12px; }
    .privacy-strip p { color: var(--texte-secondaire); margin: 0 0 20px; }
    .privacy-strip .compliance-badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .privacy-strip .compliance-badges span {
      padding: 6px 14px;
      border: 1px solid var(--bordure);
      border-radius: 999px;
      font-size: 0.85em;
      color: var(--texte-secondaire);
      background: var(--fond);
    }

    /* Footer */
    footer {
      padding: 32px 24px;
      background: var(--fond);
      border-top: 1px solid var(--bordure);
      color: var(--texte-secondaire);
      font-size: 0.88em;
    }
    footer .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: space-between;
    }
    footer .identite strong {
      display: block;
      color: var(--texte);
      margin-bottom: 4px;
    }
    footer .liens a {
      color: var(--bleu);
      text-decoration: none;
      margin-right: 16px;
    }
    footer .liens a:hover { text-decoration: underline; }
    footer .conformite {
      margin-top: 12px;
      font-size: 0.92em;
    }
  </style>
</head>
<body>
  {{ content }}

  <footer>
    <div class="container">
      <div class="identite">
        <strong>Origo Technologies</strong>
        Québec, Canada<br>
        <a href="mailto:support@playco.ca">support@playco.ca</a>
      </div>
      <div class="liens">
        <a href="{{ '/legal/privacy-policy-fr/' | relative_url }}">Confidentialité (FR)</a>
        <a href="{{ '/legal/privacy-policy-en/' | relative_url }}">Privacy (EN)</a>
        <a href="{{ '/legal/terms-of-service-fr/' | relative_url }}">Conditions (FR)</a>
        <a href="{{ '/legal/terms-of-service-en/' | relative_url }}">Terms (EN)</a>
        <div class="conformite">
          © 2026 Origo Technologies · Conforme <a href="https://www.cai.gouv.qc.ca/">Loi 25 (Québec)</a> · Loi 96 (français langue commune) · LPRPDE · Juridiction : tribunaux du Québec.
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
